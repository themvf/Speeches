name: Daily Financial News Pipeline

on:
  schedule:
    - cron: "17 11 * * *"
    - cron: "17 12 * * *"
  workflow_dispatch:
    inputs:
      ingest_limit:
        description: "Max news articles to ingest"
        required: false
        default: "10"
      lookback_days:
        description: "Override NewsAPI lookback window in days"
        required: false
        default: ""
      enrich_limit:
        description: "Max articles to enrich"
        required: false
        default: "10"
      heuristic_only:
        description: "Skip OpenAI and use heuristic enrichment only"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: daily-financial-news
  cancel-in-progress: false

jobs:
  financial-news:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEWSAPI_API_KEY: ${{ secrets.NEWSAPI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}
      GCS_CREDENTIALS_JSON: ${{ secrets.GCS_CREDENTIALS_JSON }}
      INGEST_LIMIT: ${{ github.event.inputs.ingest_limit || '' }}
      LOOKBACK_DAYS_OVERRIDE: ${{ github.event.inputs.lookback_days || '' }}
      ENRICH_LIMIT: ${{ github.event.inputs.enrich_limit || '' }}
      HEURISTIC_ONLY: ${{ github.event.inputs.heuristic_only || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Time Gate
        id: timegate
        run: |
          python - <<'PY'
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo

          now = datetime.now(ZoneInfo("America/New_York"))
          event_name = os.getenv("GITHUB_EVENT_NAME", "")
          run_now = event_name == "workflow_dispatch" or now.hour == 7

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"run_now={'true' if run_now else 'false'}\n")
              f.write(f"ny_timestamp={now.isoformat()}\n")
          print(f"New York time: {now.isoformat()} | run_now={run_now}")
          PY

      - name: Run Financial News Ingest
        if: steps.timegate.outputs.run_now == 'true'
        run: |
          set -euo pipefail
          args=(ingest --require-remote-persistence --summary-path financial_news_ingest_summary.json)
          if [ -n "${INGEST_LIMIT}" ]; then
            args+=(--limit "${INGEST_LIMIT}")
          fi
          if [ -n "${LOOKBACK_DAYS_OVERRIDE}" ]; then
            args+=(--lookback-days "${LOOKBACK_DAYS_OVERRIDE}")
          fi
          python run_financial_news_pipeline.py "${args[@]}"

      - name: Capture Ingest Outputs
        id: ingest_summary
        if: steps.timegate.outputs.run_now == 'true'
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("financial_news_ingest_summary.json")
          payload = {}
          if path.exists():
            payload = json.loads(path.read_text(encoding="utf-8"))

          processed_count = int(payload.get("processed_count", 0) or 0)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"processed_count={processed_count}\n")
          print(json.dumps(payload, indent=2))
          PY

      - name: Run Financial News Enrichment
        if: steps.timegate.outputs.run_now == 'true' && steps.ingest_summary.outputs.processed_count != '0'
        run: |
          set -euo pipefail
          args=(enrich --require-remote-persistence --doc-ids-from-summary financial_news_ingest_summary.json --summary-path financial_news_enrich_summary.json)
          if [ -n "${ENRICH_LIMIT}" ]; then
            args+=(--limit "${ENRICH_LIMIT}")
          fi
          if [ "${HEURISTIC_ONLY}" = "true" ]; then
            args+=(--heuristic-only)
          fi
          python run_financial_news_pipeline.py "${args[@]}"

      - name: Upload Summaries
        if: always() && steps.timegate.outputs.run_now == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: financial-news-summaries-${{ github.run_id }}
          path: |
            financial_news_ingest_summary.json
            financial_news_enrich_summary.json
          if-no-files-found: ignore
