name: Policy Extraction (On Demand)

on:
  workflow_dispatch:
    inputs:
      connector:
        description: "Connector/source_kind to run"
        required: true
        type: choice
        options:
          - sec_speech
          - sec_tm_faq
          - sec_enforcement_litigation
          - finra_regulatory_notice
          - finra_key_topic
          - doj_usao_press_release
          - federal_reserve_speech_testimony
          - cftc_press_release
          - cftc_public_statement_remark
        default: sec_enforcement_litigation
      selection:
        description: "Extraction selection scope"
        required: false
        type: choice
        options:
          - new_or_updated
          - all
        default: new_or_updated
      extraction_limit:
        description: "Max documents to extract"
        required: false
        default: "25"
      max_pages:
        description: "Listing pages to scan"
        required: false
        default: "5"
      base_url:
        description: "Optional connector index URL override"
        required: false
        default: ""
      include_pdfs:
        description: "Include PDF links (SEC TM FAQ)"
        required: false
        type: boolean
        default: true
      include_rss:
        description: "Use RSS supplement (FINRA notices)"
        required: false
        type: boolean
        default: true
      exclude_terms:
        description: "Optional comma-separated exclude phrases (used by DOJ press releases)"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: policy-extraction-manual
  cancel-in-progress: false

jobs:
  extract-policy-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}
      GCS_CREDENTIALS_JSON: ${{ secrets.GCS_CREDENTIALS_JSON }}
      CONNECTOR: ${{ github.event.inputs.connector }}
      SELECTION: ${{ github.event.inputs.selection || 'new_or_updated' }}
      EXTRACTION_LIMIT: ${{ github.event.inputs.extraction_limit || '25' }}
      MAX_PAGES: ${{ github.event.inputs.max_pages || '5' }}
      BASE_URL: ${{ github.event.inputs.base_url || '' }}
      INCLUDE_PDFS: ${{ github.event.inputs.include_pdfs || 'true' }}
      INCLUDE_RSS: ${{ github.event.inputs.include_rss || 'true' }}
      EXCLUDE_TERMS: ${{ github.event.inputs.exclude_terms || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Connector Extraction
        run: |
          set -euo pipefail
          args=(--connector "${CONNECTOR}" --selection "${SELECTION}" --limit "${EXTRACTION_LIMIT}" --max-pages "${MAX_PAGES}" --include-pdfs "${INCLUDE_PDFS}" --include-rss "${INCLUDE_RSS}" --exclude-terms "${EXCLUDE_TERMS}" --require-remote-persistence --summary-path policy_extraction_summary.json)
          if [ -n "${BASE_URL}" ]; then
            args+=(--base-url "${BASE_URL}")
          fi
          python run_connector_extraction_pipeline.py "${args[@]}"

      - name: Upload Extraction Summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: policy-extraction-summary-${{ github.run_id }}
          path: policy_extraction_summary.json
          if-no-files-found: ignore
