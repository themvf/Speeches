name: Daily Trends Aggregation

on:
  schedule:
    - cron: "45 13 * * *"
  workflow_dispatch:
    inputs:
      min_mentions:
        description: "Minimum tag mentions to include a trend"
        required: false
        default: "5"
      dry_run:
        description: "Skip OpenAI calls (dry run)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: daily-trends-aggregation
  cancel-in-progress: false

jobs:
  trends:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}
      GCS_CREDENTIALS_JSON: ${{ secrets.GCS_CREDENTIALS_JSON }}
      MIN_MENTIONS: ${{ github.event.inputs.min_mentions || '5' }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Trend Aggregation
        run: |
          set -euo pipefail
          args=(--min-mentions "${MIN_MENTIONS}" --limit 20)
          if [ "${DRY_RUN}" = "true" ]; then
            args+=(--dry-run)
          fi
          python trend_aggregation.py "${args[@]}"

      - name: Upload Trends Output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trends-output-${{ github.run_id }}
          path: data/trends_daily.json
          if-no-files-found: ignore
