name: Intelligence Evidence

on:
  schedule:
    - cron: "*/5 * * * *"
  pull_request:
    paths:
      - "apps/web/app/api/intelligence/gdelt-evidence/route.ts"
      - "apps/web/components/intelbeta-dashboard.tsx"
      - "apps/web/lib/intelligence-types.ts"
      - "apps/web/lib/server/gdelt-gkg.ts"
      - "apps/web/lib/server/stored-category-evidence.ts"
      - "apps/web/lib/theme-intelligence.ts"
      - "apps/web/lib/theme-intelligence.test.ts"
      - "apps/web/scripts/check-aml-evidence-endpoint.ts"
      - "apps/web/scripts/check-gdelt-evidence-live.ts"
      - "apps/web/package.json"
      - "apps/web/package-lock.json"
      - ".github/workflows/intelligence-evidence.yml"
  push:
    branches:
      - main
    paths:
      - "apps/web/app/api/intelligence/gdelt-evidence/route.ts"
      - "apps/web/components/intelbeta-dashboard.tsx"
      - "apps/web/lib/intelligence-types.ts"
      - "apps/web/lib/server/gdelt-gkg.ts"
      - "apps/web/lib/server/stored-category-evidence.ts"
      - "apps/web/lib/theme-intelligence.ts"
      - "apps/web/lib/theme-intelligence.test.ts"
      - "apps/web/scripts/check-aml-evidence-endpoint.ts"
      - "apps/web/scripts/check-gdelt-evidence-live.ts"
      - "apps/web/package.json"
      - "apps/web/package-lock.json"
      - ".github/workflows/intelligence-evidence.yml"
  workflow_dispatch:
    inputs:
      require_live_matches:
        description: "Fail if live GDELT returns zero AML evidence matches"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: intelligence-evidence-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/web
    env:
      GDELT_LIVE_REQUIRED: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.require_live_matches == 'true' && '1' || '0' }}
      AML_EVIDENCE_ENDPOINT_URL: https://speeches-zeta.vercel.app/api/intelligence/gdelt-evidence?category=AML

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install Dependencies
        if: github.event_name != 'schedule'
        run: npm ci

      - name: Run Theme Intelligence Tests
        if: github.event_name != 'schedule'
        run: npm run test:theme-intelligence

      - name: Typecheck
        if: github.event_name != 'schedule'
        run: npm run typecheck

      - name: Smoke Test Live GDELT AML Evidence
        if: github.event_name != 'schedule'
        run: npm run test:gdelt-evidence-live

      - name: Smoke Test Live GDELT Capital Formation Evidence
        if: github.event_name != 'schedule'
        env:
          GDELT_EVIDENCE_CATEGORY: CAPITAL_FORMATION
        run: npm run test:gdelt-evidence-live

      - name: Smoke Test Production AML Evidence Endpoint
        run: npm run test:aml-evidence-endpoint

      - name: Smoke Test Production Capital Formation Evidence Endpoint
        env:
          EVIDENCE_CATEGORY: CAPITAL_FORMATION
        run: npm run test:aml-evidence-endpoint
